<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="BMO — your friendly terminal companion">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="BMO">
  <!-- iOS home screen icon: 180x180 solid background (iOS ignores alpha, renders as black).
       ?v=1 busts iOS aggressive icon caching when the icon changes. -->
  <link rel="apple-touch-icon" href="icons/apple-touch-icon-180.png?v=1">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png?v=1"/>

  <title>BMO</title>
  <link rel="manifest" href="manifest.json">

  <!--
    Failsafe stub: ensures window.hashwasm is NEVER null, even if the
    module script below fails to load (404, CSP, network error, etc.).

    This runs synchronously during HTML parsing, BEFORE the deferred
    module script. The module script (if successful) overwrites this
    stub with the real hash-wasm functions.

    If the stub is never overwritten, any dargon2 call will throw a
    visible error: "hash-wasm WASM module not loaded".

    Without this stub, dargon2 would silently fall back to a dynamic
    import() of the hash-wasm module from a third-party CDN — which
    is unacceptable for a zero-knowledge vault.
  -->
  <script>
    window.hashwasm = {
      argon2i: function() {
        throw new Error("hash-wasm WASM module not loaded. " +
          "The self-hosted /hash-wasm/index.esm.js failed to initialize. " +
          "The vault cannot derive keys.");
      },
      argon2d: function() {
        throw new Error("hash-wasm WASM module not loaded. " +
          "The self-hosted /hash-wasm/index.esm.js failed to initialize. " +
          "The vault cannot derive keys.");
      },
      argon2id: function() {
        throw new Error("hash-wasm WASM module not loaded. " +
          "The self-hosted /hash-wasm/index.esm.js failed to initialize. " +
          "The vault cannot derive keys.");
      },
      argon2Verify: function() {
        throw new Error("hash-wasm WASM module not loaded. " +
          "The self-hosted /hash-wasm/index.esm.js failed to initialize. " +
          "The vault cannot derive keys.");
      },
    };
  </script>

  <!--
    Pre-load hash-wasm from local asset (zero CDN, required for vault crypto).
    Overwrites the failsafe stub above with real WASM-backed functions.
  -->
  <script type="module">
    import { argon2i, argon2d, argon2id, argon2Verify }
      from '/hash-wasm/index.esm.js';
    window.hashwasm = { argon2i, argon2d, argon2id, argon2Verify };
  </script>
</head>
<body>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
